<!DOCTYPE html>
<html>
<body>

<h2>Student Login</h2>

<input id="roll" placeholder="Roll Number"><br><br>

<button onclick="go()">Login</button>

<script>
function go(){
localStorage.setItem("roll",
document.getElementById("roll").value);
window.location="profile.html";
}
</script>

</body>
</html>
