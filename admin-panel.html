<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h2>Add Student</h2>

<input id="roll" placeholder="Roll Number"><br>
<input id="name" placeholder="Name"><br>
<input id="class" placeholder="Class"><br>
<input id="marks" placeholder="Marks"><br>
<input type="file" id="photo"><br><br>

<button onclick="addStudent()">Add Student</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script src="firebase-config.js"></script>

<script>

function addStudent(){

let roll = document.getElementById("roll").value;
let name = document.getElementById("name").value;
let studentClass = document.getElementById("class").value;
let marks = document.getElementById("marks").value;

let file = document.getElementById("photo").files[0];

let storageRef = storage.ref("students/"+roll);

storageRef.put(file).then(()=>{

storageRef.getDownloadURL().then(url=>{

db.collection("students").doc(roll).set({

roll: roll,
name: name,
class: studentClass,
marks: marks,
photo: url

});

alert("Student added successfully");

});

});

}

</script>

</body>
</html>
